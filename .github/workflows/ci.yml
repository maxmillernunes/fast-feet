name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock

    env:
      # API
      PORT: 3333
      
      # Database
      DATABASE_SCHEMA: public
      POSTGRES_HOST: localhost 
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      
      # Prisma URL
      DATABASE_URL: postgresql://${{ vars.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ vars.POSTGRES_DB }}?schema=public

      # JWT
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}

      # AWS / S3
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
      AWS_ENDPOINT: http://localhost:4566

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Unit tests
        run: pnpm test

      - name: Wait for MiniStack to be ready
        run: |
          echo "Aguardando o MiniStack iniciar..."
          for i in {1..30}; do
            if curl -f http://localhost:4566/_ministack/health > /dev/null 2>&1; then
              echo "MiniStack está pronto!"
              exit 0
            fi
            echo "Tentativa $i/30: aguardando..."
            sleep 2
          done
          echo "Erro: MiniStack não ficou pronto a tempo."
          exit 1

      - name: Create S3 Buckets to run E2E tests
        run: |
          aws --endpoint-url=http://localhost:4566 s3 mb s3://fast-feet

      - name: E2E Tests
        run: pnpm test:e2e
