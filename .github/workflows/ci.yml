name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fast-feet
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/fast-feet?schema=public"
      AWS_REGION: "us-east-2"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_S3_BUCKET: "fast-feet"
      AWS_ENDPOINT: "http://localhost:4566" 

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Unit tests
        run: pnpm test

      - name: Wait for MiniStack to be ready
        run: |
          echo "Aguardando o MiniStack iniciar..."
          for i in {1..30}; do
            if curl -f http://localhost:4566/_ministack/health > /dev/null 2>&1; then
              echo "MiniStack está pronto!"
              exit 0
            fi
            echo "Tentativa $i/30: aguardando..."
            sleep 2
          done
          echo "Erro: MiniStack não ficou pronto a tempo."
          exit 1

      - name: Create S3 Buckets to run E2E tests
        run: |
          aws --endpoint-url=http://localhost:4566 s3 mb s3://fast-feet

      - name: E2E Tests
        run: pnpm test:e2e
